name: Release

# Runs after a PR is merged into main. Detects which extensions changed,
# bumps their versions, builds, packs, and creates GitHub Releases.
#
# All work happens in a single job so there is only one push to main —
# eliminating the race condition that occurred when parallel jobs each tried
# to push their own version-bump commit.
#
# Bump type is controlled by PR labels:
#   major  →  breaking change
#   minor  →  new feature
#   (none) →  patch (default)
#
# To add a new extension, append a "name:run-tests" entry to EXTENSIONS.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Release extensions
    if: |
      github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.labels.*.name, 'skip-release')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type
        id: bump
        run: |
          LABELS='${{ join(github.event.pull_request.labels.*.name, ' ') }}'
          if echo "$LABELS" | grep -qw major; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -qw minor; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and version changed extensions
        id: build
        env:
          BUMP: ${{ steps.bump.outputs.type }}
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          # "extension-dir:run-tests"  — add new extensions here
          EXTENSIONS=(
            "agent-monitor:true"
            "docs-panel:false"
            "github-actions:false"
            "local-web-viewer:false"
            "system-monitor:true"
          )

          RELEASE_LOG=/tmp/releases.tsv   # columns: ext  old_ver  new_ver  tarball

          for entry in "${EXTENSIONS[@]}"; do
            EXT="${entry%%:*}"
            HAS_TESTS="${entry##*:}"

            CHANGED=$(git diff --name-only "$BASE" HEAD -- "$EXT/src/" "$EXT/build.mjs")
            if [ -z "$CHANGED" ]; then
              echo "[$EXT] no source changes — skipping"
              continue
            fi

            echo "[$EXT] source changed — releasing"
            pushd "$EXT" > /dev/null

            npm ci
            OLD=$(node -p "require('./package.json').version")
            npm version "$BUMP" --no-git-tag-version
            NEW=$(node -p "require('./package.json').version")

            [ "$HAS_TESTS" = "true" ] && npm test
            npm run build
            TARBALL=$(basename "$(npm pack --pack-destination ../)")

            popd > /dev/null
            git add "$EXT/package.json" "$EXT/package-lock.json"
            printf '%s\t%s\t%s\t%s\n' "$EXT" "$OLD" "$NEW" "$TARBALL" >> "$RELEASE_LOG"
            echo "[$EXT] $OLD → $NEW  ($TARBALL)"
          done

          if [ ! -f "$RELEASE_LOG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit, push, and tag
        if: steps.build.outputs.skip != 'true'
        run: |
          set -euo pipefail
          RELEASE_LOG=/tmp/releases.tsv

          SUMMARY=$(awk -F'\t' '{printf "%s v%s, ", $1, $3}' "$RELEASE_LOG" | sed 's/, $//')
          git commit -m "chore(release): $SUMMARY [skip ci]"

          # Absorb any commits that landed on main between checkout and now
          git pull --rebase origin main
          git push origin HEAD:main

          while IFS=$'\t' read -r EXT OLD NEW TARBALL; do
            git tag "$EXT@v$NEW"
            git push origin "refs/tags/$EXT@v$NEW"
          done < "$RELEASE_LOG"

      - name: Create GitHub Releases
        if: steps.build.outputs.skip != 'true'
        run: |
          set -euo pipefail
          RELEASE_LOG=/tmp/releases.tsv

          while IFS=$'\t' read -r EXT OLD NEW TARBALL; do
            TAG="$EXT@v$NEW"
            OLD_TAG="$EXT@v$OLD"
            NOTES_FLAG=""
            git rev-parse "$OLD_TAG" >/dev/null 2>&1 && NOTES_FLAG="--notes-start-tag $OLD_TAG"

            # shellcheck disable=SC2086
            gh release create "$TAG" "$TARBALL" \
              --title "$EXT v$NEW" \
              --generate-notes \
              $NOTES_FLAG
          done < "$RELEASE_LOG"
