name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # Add a block here for each extension as the repo grows.
  # All extensions build on every PR — it's fast and catches cross-cutting breakage.

  docs-panel:
    name: docs-panel — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-panel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-panel/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
